services:
  warehouse-db:
    image: postgres:16
    container_name: olist_warehouse_db
    environment:
      POSTGRES_DB: olist_warehouse
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
    ports:
      - "5432:5432"
    volumes:
      - warehouse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse -d olist_warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5
    
  metabase-db:
    image: postgres:16
    container_name: olist_metabase_app_db
    environment:
      POSTGRES_DB: metabaseappdb
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase
    ports:
      - "5433:5432"
    volumes:
      - metabase_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabase -d metabaseappdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:latest
    container_name: olist_metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabaseappdb
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabase
      MB_DB_HOST: metabase-db
    depends_on:
      metabase-db:
        condition: service_healthy
      warehouse-db:
        condition: service_healthy

volumes:
  warehouse_postgres_data:
  metabase_postgres_data:
