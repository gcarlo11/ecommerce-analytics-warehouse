version: 2

models:
  - name: dim_customer
    description: One row per Olist customer_id.
    columns:
      - name: customer_key
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - unique
          - not_null

  - name: dim_product
    description: One row per product.
    columns:
      - name: product_key
        data_tests:
          - unique
          - not_null
      - name: product_id
        data_tests:
          - unique
          - not_null

  - name: dim_seller
    description: One row per seller.
    columns:
      - name: seller_key
        data_tests:
          - unique
          - not_null
      - name: seller_id
        data_tests:
          - unique
          - not_null

  - name: fact_orders
    description: One row per order.
    columns:
      - name: order_key
        data_tests:
          - unique
          - not_null
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: order_status
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - delivered
                  - shipped
                  - canceled
                  - unavailable
                  - invoiced
                  - processing
                  - created
                  - approved

  - name: fact_order_items
    description: One row per item inside an order.
    columns:
      - name: order_item_key
        data_tests:
          - unique
          - not_null
      - name: order_id
        data_tests:
          - not_null

  - name: fact_payments
    description: One row per payment sequence per order.
    columns:
      - name: payment_key
        data_tests:
          - unique
          - not_null
      - name: payment_type
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - credit_card
                  - boleto
                  - voucher
                  - debit_card
                  - not_defined

  - name: fact_reviews
    description: One row per review per order.
    columns:
      - name: review_key
        data_tests:
          - unique
          - not_null
      - name: review_score
        data_tests:
          - not_null

  - name: fact_shipping
    description: One row per order shipping lifecycle.
    columns:
      - name: shipping_key
        data_tests:
          - unique
          - not_null